<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300">
  <rect width="960" height="300" fill="#f8fafc"/>
  <style>
    .box{fill:#ffffff;stroke:#0f766e;stroke-width:2;rx:12}
    .t{font-family:Arial, sans-serif;font-size:18px;fill:#111827;font-weight:700}
    .s{font-family:Arial, sans-serif;font-size:13px;fill:#374151}
    .a{stroke:#0f766e;stroke-width:3;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/></marker></defs>
  <rect class="box" x="30" y="88" width="155" height="90"/><text class="t" x="58" y="120">Observe</text><text class="s" x="56" y="148">RF, OWC, demand</text>
  <rect class="box" x="225" y="88" width="155" height="90"/><text class="t" x="256" y="120">Predict</text><text class="s" x="249" y="148">mobility and blockage</text>
  <rect class="box" x="420" y="88" width="155" height="90"/><text class="t" x="450" y="120">Select Link</text><text class="s" x="448" y="148">RF or optical wireless</text>
  <rect class="box" x="615" y="88" width="155" height="90"/><text class="t" x="648" y="120">Evaluate</text><text class="s" x="643" y="148">QoS, energy, reliability</text>
  <rect class="box" x="805" y="88" width="125" height="90"/><text class="t" x="832" y="120">Audit</text><text class="s" x="827" y="148">reports and ledger</text>
  <line class="a" x1="185" y1="133" x2="225" y2="133"/><line class="a" x1="380" y1="133" x2="420" y2="133"/><line class="a" x1="575" y1="133" x2="615" y2="133"/><line class="a" x1="770" y1="133" x2="805" y2="133"/>
</svg>
